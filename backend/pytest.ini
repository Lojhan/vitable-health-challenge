[pytest]
DJANGO_SETTINGS_MODULE = backend.settings
python_files = tests.py test_*.py *_tests.py
# Filter out database teardown warnings that can occur during test execution
# when tests with transaction=True are run. These are expected and not failures.
filterwarnings =
    ignore::DeprecationWarning:django.utils.decorators
    ignore:Error when trying to teardown test databases.*:pytest.PytestWarning
